[pytest]
testpaths   = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --color=yes -p no:warnings

markers =
    unit:        Pruebas unitarias (funciones puras)
    functional:  Pruebas funcionales (rutas web con mocks)
    integration: Pruebas de integración (flujos multi-ruta)
    security:    Pruebas de seguridad (CSRF, ownership, rate limit)